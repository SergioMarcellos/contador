<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Regressivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Contador Regressivo</h1>
        <div class="countdown">
            <div class="box">
                <span id="days" class="number">00</span>
                <p class="label">Dias</p>
            </div>
            <div class="box">
                <span id="hours" class="number">00</span>
                <p class="label">Horas</p>
            </div>
            <div class="box">
                <span id="minutes" class="number">00</span>
                <p class="label">Minutos</p>
            </div>
            <div class="box">
                <span id="seconds" class="number">00</span>
                <p class="label">Segundos</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
